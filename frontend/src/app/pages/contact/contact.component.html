<div class="contact-container">
  <section class="contact-hero fade-in">
    <h1>Get in Touch</h1>
    <p>Whether you have a question about our roasts or want to feedback on our service, we're here to listen.</p>
  </section>

  <section class="contact-grid-section">
    <div class="contact-grid">
      <div class="contact-info-card slide-up" style="--delay: 0.1s">
        <h2>Contact Details</h2>
        <div class="contact-method">
          <span class="icon">📍</span>
          <div>
            <h3>Visit Us</h3>
            <p>123 Coffee Lane<br>Brew City, BC 45678</p>
          </div>
        </div>
        <div class="contact-method">
          <span class="icon">📧</span>
          <div>
            <h3>Email</h3>
            <p>hello@brewlive.com<br>support@brewlive.com</p>
          </div>
        </div>
        <div class="contact-method">
          <span class="icon">📞</span>
          <div>
            <h3>Phone</h3>
            <p>+1 (555) 123-4567</p>
          </div>
        </div>
      </div>

      <div class="contact-form-card slide-up" style="--delay: 0.3s">
        <h2>Send a Message</h2>
        <form>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your Name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Your Email">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Your Message"></textarea>
          </div>
          <button type="submit" class="btn-caramel">Send Message</button>
        </form>
      </div>
    </div>
  </section>
</div>
